name: Auth Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/auth-service/**'
      - 'backend/pom.xml'
      - '.github/workflows/auth-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/auth-service/**'
      - 'backend/pom.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Auth Service
      run: |
        mvn -pl backend/auth-service -am clean package

    - name: Verify Generated JAR
      run: |
        ls -l backend/auth-service/target
