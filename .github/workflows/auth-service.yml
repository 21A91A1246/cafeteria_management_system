name: Auth Service CI

on:
  push:
    paths:
      - 'backend/auth-service/**'
      - 'backend/pom.xml'
  pull_request:
    paths:
      - 'backend/auth-service/**'
      - 'backend/pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test Auth Service
      run: |
        mvn -pl backend/auth-service -am clean test
