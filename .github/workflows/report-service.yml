name: Report Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/report-service/**'
      - 'backend/pom.xml'
      - '.github/workflows/report-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/report-service/**'
      - 'backend/pom.xml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Report Service
      run: |
        mvn -f backend/pom.xml -pl report-service -am clean package

    - name: Verify Generated JAR
      run: |
        ls -l backend/report-service/target

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build and Push Docker Image
      if: github.event_name != 'pull_request'
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/report-service:latest -f backend/report-service/Dockerfile backend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/report-service:latest
