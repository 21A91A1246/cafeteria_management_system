name: React Client CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Dependencies
      run: |
        cd frontend
        npm install

    - name: Build React Client
      run: |
        cd frontend
        npm run build

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build and Push Docker Image
      if: github.event_name != 'pull_request'
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cafeteria-frontend:latest -f frontend/Dockerfile frontend
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cafeteria-frontend:latest
