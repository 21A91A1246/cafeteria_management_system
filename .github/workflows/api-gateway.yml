name: API Gateway CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/pom.xml'
      - '.github/workflows/api-gateway.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/pom.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build API Gateway
      run: |
        mvn -f backend/pom.xml -pl api-gateway -am clean package

    - name: Verify Generated JAR
      run: |
        ls -l backend/api-gateway/target
