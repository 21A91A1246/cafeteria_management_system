server:
  port: 8084

spring:
  application:
    name: report-service
  datasource:
    url: jdbc:mysql://localhost:3306/cafeteria_report_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Service URL configurations
services:
  order-service:
    url: http://localhost:8083

# Observability, Metrics & Health Probes
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
