server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/auth/**
        
        - id: menu-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/menu/**
            
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        - id: report-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/reports/**

        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**

# Observability, Metrics & Health Probes
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
